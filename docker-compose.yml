# Example/template compose for running incipit. Copy it next to a `config/`
# directory and adjust the library path, port, and user, or point a deployment's
# own compose at this repo as the build context:
#
#   services:
#     incipit:
#       build:
#         context: /path/to/incipit   # this repo is the single source of truth
#       ...
#
# This repository is the source of truth for the incipit binary; real
# deployments keep their own compose + config outside the repo and build from it.
services:
  incipit:
    build: .
    # Or use a published image once available:
    # image: ghcr.io/incipit/incipit:latest
    container_name: incipit
    restart: unless-stopped
    # Run as the host user that owns the Calibre library, so incipit can move/
    # rename book folders and write covers. Per-author folders are typically
    # 0755 owned by that user, so the default nonroot uid 65532 gets "permission
    # denied" on edits — match the owner instead (use "0:0" if the tree is
    # root-owned). ./config must be owned by the same uid.
    user: "1000:1000"
    # Resolve host.docker.internal on plain Linux Docker (needed to reach an
    # LDAP server published on the host, e.g. ldap://host.docker.internal:389).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      # Existing Calibre library (contains metadata.db).
      - ./library:/library
      # Incipit's own state: app.db, image cache, generated secrets.
      - ./config:/config
    environment:
      INCIPIT_ADDR: ":8080"
      INCIPIT_CONFIG: "/config"
      # Pre-configure the library path (skips first-run library picker).
      INCIPIT_LIBRARY: "/library"
      # Set to true to never write to the Calibre library.
      INCIPIT_READONLY: "false"
      # Leave false behind a TLS-terminating reverse proxy: cookies are marked
      # Secure per-request when X-Forwarded-Proto is https, so HTTPS gets Secure
      # cookies while direct http LAN access still works. Set true to force
      # Secure on every request.
      INCIPIT_SECURE_COOKIES: "false"

      # --- LDAP authentication ---
      # Configure (and import users) in the admin UI under Admin → LDAP.
      # These env vars only seed the initial connection values on first run
      # (the bind password is set in the UI and stored in app.db):
      # INCIPIT_LDAP_ENABLED: "true"
      # INCIPIT_LDAP_URL: "ldaps://ldap.example.com:636"
      # INCIPIT_LDAP_BASE_DN: "ou=people,dc=example,dc=com"
      # INCIPIT_LDAP_ADMIN_GROUP_DN: "cn=admins,ou=groups,dc=example,dc=com"
      # Restrict login to members of one group (calibre-web-style group filter):
      # INCIPIT_LDAP_LOGIN_GROUP_DN: "cn=incipit-users,ou=groups,dc=example,dc=com"
      # INCIPIT_LDAP_STARTTLS: "false"

      # --- Optional: reverse-proxy header auth (only behind a trusted proxy) ---
      # INCIPIT_PROXY_AUTH_ENABLED: "true"
      # INCIPIT_PROXY_AUTH_HEADER: "X-Authenticated-User"
      # INCIPIT_PROXY_AUTH_ADMIN_HEADER: "X-Authenticated-Admin"
